services:
  - type: web
    name: surgai-platform
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: surgai-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
